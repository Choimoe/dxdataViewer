name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cd:
    name: Build and deploy

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [20]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build
        env:
          VITE_BASE_PUBLIC_PATH: ${{ secrets.VITE_BASE_PUBLIC_PATH }}
        run: |
          echo "Building with VITE_BASE_PUBLIC_PATH=${VITE_BASE_PUBLIC_PATH:-/dxdataViewer/}"
          pnpm run build
          echo "Build completed. Contents of dist:"
          ls -la dist/ | head -n 20

      - name: Configure SPA 404 fallback
        run: |
          if [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
            echo "Created SPA 404 fallback"
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
