<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DXData Viewer</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 20% 0%, #f8fafc 0%, #e2e8f0 45%, #cbd5e1 100%);
      }

      #boot-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 9999;
      }

      .boot-card {
        width: min(88vw, 420px);
        border: 1px solid rgba(100, 116, 139, 0.35);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
        -webkit-backdrop-filter: blur(5px);
        backdrop-filter: blur(5px);
        padding: 20px;
      }

      .boot-title {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #0f172a;
      }

      .boot-text {
        margin: 0 0 12px;
        font-size: 13px;
        color: #334155;
      }

      .boot-bar {
        position: relative;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #cbd5e1;
      }

      .boot-bar::before {
        content: '';
        position: absolute;
        inset: 0;
        width: 35%;
        background: linear-gradient(90deg, #2563eb, #0ea5e9);
        animation: boot-slide 1.1s ease-in-out infinite;
      }

      @keyframes boot-slide {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }

      #boot-shell.hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }
    </style>
    <script type="module" crossorigin src="/dxdataViewer/assets/index-yArX22kk.js"></script>
    <link rel="modulepreload" crossorigin href="/dxdataViewer/assets/vue-Dak8qlbF.js">
    <link rel="stylesheet" crossorigin href="/dxdataViewer/assets/index-DMm8ny5K.css">
  </head>
  <body>
    <div id="boot-shell" aria-hidden="true">
      <div class="boot-card">
        <h1 class="boot-title">DXData Viewer</h1>
        <p class="boot-text">正在加载应用资源...</p>
        <div class="boot-bar"></div>
      </div>
    </div>
    <div id="app"></div>
  </body>
</html>
